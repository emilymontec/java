spring.application.name=AtlasBank
server.port=8080

spring.datasource.url=jdbc:sqlite:atlasbank.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false

spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false
spring.jpa.open-in-view=false

# Emergency admin credentials (Spring doesn't auto-load .env files)
EMERGENCY_ADMIN_USERNAME=./chief
EMERGENCY_ADMIN_PASSWORD=P@ss-CHIEF-83f7d9
EMERGENCY_ADMIN_ROLE=EXECUTIVE

spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
