spring.application.name=AtlasBank
server.port=8080
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

# PostgreSQL:
# - If DB_URL is defined, it will be used (e.g. PostgreSQL/Nhost)
# - Otherwise, app starts locally with H2 file DB
spring.datasource.url=${DB_URL:jdbc:h2:file:./atlasbank;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true

spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false
spring.jpa.open-in-view=false

spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true

# Emergency admin
atlasbank.emergency-admin.username=${EMERGENCY_ADMIN_USERNAME}
atlasbank.emergency-admin.password=${EMERGENCY_ADMIN_PASSWORD}
atlasbank.emergency-admin.role=${EMERGENCY_ADMIN_ROLE}
