<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Página no encontrada</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #15803d;
            --negro: #111827;
            --blanco: #ffffff;
            --gris-texto: #6b7280;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--blanco); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .error-container { text-align: center; }
        .error-code { font-size: 8rem; font-weight: 600; color: var(--gris-texto); line-height: 1; }
        .error-code span { color: var(--primario); }
        h1 { font-size: 2rem; letter-spacing: -1px; margin: 20px 0; }
        p { color: var(--gris-texto); margin-bottom: 40px; }
        .btn-home { padding: 18px 40px; background: var(--primario); color: white; text-decoration: none; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-home:hover { background: var(--negro); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">4<span>0</span>4</div>
        <h1>Página no encontrada</h1>
        <p>La página que buscas no existe o fue movida.</p>
        <a href="/inicio.html" class="btn-home">Volver al Inicio</a>
    </div>
</body>
</html>
