<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Operation Halted</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        body { background-color: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .error-card { background: white; padding: 60px; border-radius: var(--radius-sm); border: 1px solid var(--border); box-shadow: var(--shadow-lg); max-width: 500px; width: 100%; text-align: center; position: relative; }
        .error-card::after { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--error); }
        .status-icon { color: var(--error); font-size: 5rem; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 15px; color: var(--bg-dark); }
    </style>
</head>
<body>
    <div class="error-card animate-up">
        <div class="status-icon">✕</div>
        <span class="label" style="color: var(--error); font-size: 0.7rem; letter-spacing: 2px;">Execution Failed</span>
        <h1>PROTOCOL<br>REJECTED.</h1>
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 40px;">The digital signature could not be verified or the transmission node rejected the asset movement.</p>
        
        <div class="flex gap-3">
            <a href="/customer/transferencias.html" class="btn btn-outline" style="flex: 1; padding: 1.2rem;">Review Data</a>
            <a href="/customer/dashboard.html" class="btn btn-primary" style="flex: 1; padding: 1.2rem;">Console</a>
        </div>
    </div>
</body>
</html>
