<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Operation Certified</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        body { background-color: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .cert-card { background: white; padding: 60px; border-radius: var(--radius-sm); border: 1px solid var(--border); box-shadow: var(--shadow-lg); max-width: 500px; width: 100%; text-align: center; position: relative; }
        .cert-card::after { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--primary); }
        .status-icon { color: var(--primary); font-size: 5rem; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 15px; color: var(--bg-dark); }
        .trace-id { font-family: monospace; padding: 10px 20px; background: var(--bg-alt); border: 1px solid var(--border); display: inline-block; margin: 30px 0; font-size: 0.8rem; letter-spacing: 1px; color: var(--bg-dark); font-weight: 700; }
    </style>
</head>
<body>
    <div class="cert-card animate-up">
        <div class="status-icon">✓</div>
        <span class="label" style="color: var(--primary); font-size: 0.7rem; letter-spacing: 2px;">Execution Successful</span>
        <h1>ASSETS<br>COMMITTED.</h1>
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6;">The transmission has been recorded in the permanent ledger. Funds have been distributed to the target node.</p>
        
        <div class="trace-id">
            REF: ATLAS-<span id="txIdentifier">000000</span>
        </div>
        
        <div style="margin-top: 10px;">
            <a href="/customer/dashboard.html" class="btn btn-primary" style="width: 100%; padding: 1.2rem;">Back to Terminal</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const txId = params.get('txId');
        document.getElementById('txIdentifier').textContent = txId ? txId.padStart(8, '0') : '--------';
    </script>
</body>
</html>
