<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

<div class="app-container">
    <aside class="app-sidebar">
        <div class="logo" style="color: white">AtlasBank</div>
        <nav class="sidebar-nav">
            <a href="/customer/dashboard.html" class="sidebar-link">📊 Dashboard</a>
            <a href="/customer/cuentas.html" class="sidebar-link">🏦 Cuentas</a>
            <a href="/customer/movimientos.html" class="sidebar-link">📄 Movimientos</a>
            <a href="/customer/transferencias.html" class="sidebar-link">💸 Transferencias</a>
            <a href="/customer/tarjetas.html" class="sidebar-link">💳 Tarjetas</a>
            <a href="/customer/ahorro_metas.html" class="sidebar-link">🌱 Metas de Ahorro</a>
            <a href="/customer/perfil.html" class="sidebar-link active">⚙️ Configuración</a>
        </nav>
        <div style="margin-top: auto; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p id="userDisplay" style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; color: rgba(255,255,255,0.7);">Verified Identity</p>
            <button class="btn-outline" style="width: 100%; color: white; border-color: rgba(255,255,255,0.3); font-size: 0.75rem;" onclick="sessionStorage.clear(); window.location.href='/auth/login.html';">Cerrar Sesión</button>
        </div>
    </aside>

    <main class="app-content">
        <header class="content-header">
            <div>
                <h1 style="font-size: 2.5rem; letter-spacing: -2px;">Configuración</h1>
                <p style="color: var(--gris-texto);">Gestiona tus datos personales y preferencias.</p>
            </div>
        </header>

        <div class="grid" style="grid-template-columns: 280px 1fr; gap: 40px;">
            <nav class="stat-card" style="padding: 0;">
                <a href="/customer/perfil.html" style="display: block; padding: 20px; border-bottom: 1px solid var(--gris-borde); font-weight: 600; background: var(--primario-soft); color: var(--primario);">Datos Personales</a>
                <a href="/customer/seguridad.html" style="display: block; padding: 20px; border-bottom: 1px solid var(--gris-borde); font-weight: 600;">Seguridad</a>
                <a href="/customer/privacidad.html" style="display: block; padding: 20px; font-weight: 600;">Privacidad</a>
            </nav>

            <section class="stat-card">
                <h2 style="font-size: 1.25rem; margin-bottom: 2rem; border-bottom: 1px solid var(--gris-borde); padding-bottom: 10px;">Información de Perfil</h2>
                <form id="profileForm" class="flex flex-direction-column gap-4">
                    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="fullName" disabled>
                        </div>
                        <div class="form-group">
                            <label>ID de Cliente</label>
                            <input type="text" id="customerId" disabled>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="phone" placeholder="+57 ...">
                    </div>
                    <button type="submit" class="btn-primary" style="align-self: flex-start;">Guardar Cambios</button>
                </form>
            </section>
        </div>
    </main>
</div>

<script>
const userId = sessionStorage.getItem('customerId');
if (!userId) window.location.href = '/auth/login.html';

document.getElementById('userDisplay').textContent = sessionStorage.getItem('fullName') || userId;

async function loadProfile() {
    try {
        if (isAdmin) {
            // Admins don't have a detailed profile endpoint yet, using session data
            document.getElementById('firstName').value = 'Personal';
            document.getElementById('lastName').value = 'Bancario';
            document.getElementById('email').value = userId + "@atlasbank.com";
            document.getElementById('phone').value = 'SOPORTE INTERNO';
            document.getElementById('email').disabled = true;
            document.getElementById('phone').disabled = true;
            document.querySelector('.btn-save').style.display = 'none';
        } else {
            const res = await fetch(`/api/customers/${userId}`);
            if (res.ok) {
                const customer = await res.json();
                document.getElementById('firstName').value = customer.firstName || customer.fullName.split(' ')[0] || '';
                document.getElementById('lastName').value = customer.lastName || customer.fullName.split(' ')[1] || '';
                document.getElementById('email').value = customer.email || '';
                document.getElementById('phone').value = customer.phone || '';
            }
        }
    } catch (err) { console.error(err); }
}

document.getElementById('profileForm').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('Perfil actualizado (Simulado)');
});

loadProfile();
</script>
</body>
</html>
