<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #15803d;
            --primario-soft: #f0fdf4;
            --alerta: #ef4444;
            --negro: #111827;
            --blanco: #ffffff;
            --gris-borde: #e5e7eb;
            --gris-fondo: #f9fafb;
            --gris-texto: #4b5563;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--blanco); color: var(--negro); }

        header { padding: 20px 5%; border-bottom: 1px solid var(--gris-borde); display: flex; justify-content: space-between; align-items: center; }

        main {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: calc(100vh - 76px);
        }

        .settings-nav {
            padding: 40px 15% 40px 5%;
            border-right: 1px solid var(--gris-borde);
            background: var(--gris-fondo);
        }
        .settings-nav a {
            display: block;
            text-decoration: none;
            color: var(--gris-texto);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .settings-nav a.active { color: var(--primario); border-right: 2px solid var(--primario); }
        .settings-nav a.logout { color: var(--alerta); margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--gris-borde); }

        .settings-content { padding: 60px 10%; }
        .settings-section { margin-bottom: 80px; max-width: 600px; }
        .settings-section h2 { font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 30px; border-bottom: 1px solid var(--negro); padding-bottom: 10px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--gris-texto); }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gris-borde);
            font-size: 0.95rem;
            outline: none;
        }
        input:focus { border-color: var(--primario); background: var(--primario-soft); }
        input[disabled] { background: #f3f4f6; cursor: not-allowed; border-color: transparent; }

        .btn-save {
            padding: 14px 28px;
            background: var(--negro);
            color: white;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-save:hover { background: var(--primario); }

        .security-info {
            background: var(--primario-soft);
            padding: 20px;
            font-size: 0.85rem;
            border-left: 4px solid var(--primario);
            margin-top: 20px;
            color: var(--primario);
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .settings-nav { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" style="font-weight: 600; font-size: 1.1rem; letter-spacing: -0.5px;">AtlasBank / <span style="font-weight: 300; color: var(--gris-texto);">CONFIGURACIÓN</span></div>
    <a href="/customer/dashboard.html" class="back-link" style="text-decoration:none; color:var(--negro); font-size:0.8rem; font-weight:600; text-transform:uppercase;">← Volver al Dashboard</a>
</header>

<main>
    <aside class="settings-nav">
        <a href="/customer/perfil.html" class="active">Datos Personales</a>
        <a href="/customer/seguridad.html">Seguridad y Llaves</a>
        <a href="/customer/privacidad.html">Privacidad</a>
        <a href="#" onclick="sessionStorage.clear(); window.location.href='/auth/login.html'; return false;" class="logout">Finalizar Sesión</a>
    </aside>

    <section class="settings-content">
        <div class="settings-section" id="datos">
            <h2>Datos Personales</h2>

            <form id="profileForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre(s)</label>
                        <input type="text" id="firstName" disabled>
                    </div>
                    <div class="form-group">
                        <label>Apellidos</label>
                        <input type="text" id="lastName" disabled>
                    </div>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label>Teléfono Vinculado</label>
                    <input type="text" id="phone">
                </div>
                <button type="submit" class="btn-save">Actualizar Datos</button>
            </form>
        </div>
    </section>
</main>

<script>
const role = (sessionStorage.getItem('role') || '').toUpperCase();
const isAdmin = role === 'ADMIN' || role === 'EXECUTIVE';
const userId = isAdmin ? sessionStorage.getItem('adminUser') : sessionStorage.getItem('customerId');

if (!userId) window.location.href = '/auth/login.html';

// Update context-sensitive UI
const backLink = document.querySelector('.back-link');
if (isAdmin) {
    backLink.href = '/admin/panel_admin.html';
    backLink.textContent = '← Volver al Panel Admin';
}

async function loadProfile() {
    try {
        if (isAdmin) {
            // Admins don't have a detailed profile endpoint yet, using session data
            document.getElementById('firstName').value = 'Personal';
            document.getElementById('lastName').value = 'Bancario';
            document.getElementById('email').value = userId + "@atlasbank.com";
            document.getElementById('phone').value = 'SOPORTE INTERNO';
            document.getElementById('email').disabled = true;
            document.getElementById('phone').disabled = true;
            document.querySelector('.btn-save').style.display = 'none';
        } else {
            const res = await fetch(`/api/customers/${userId}`);
            if (res.ok) {
                const customer = await res.json();
                document.getElementById('firstName').value = customer.firstName || customer.fullName.split(' ')[0] || '';
                document.getElementById('lastName').value = customer.lastName || customer.fullName.split(' ')[1] || '';
                document.getElementById('email').value = customer.email || '';
                document.getElementById('phone').value = customer.phone || '';
            }
        }
    } catch (err) {
        console.error('Error loading profile:', err);
    }
}

document.getElementById('profileForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (isAdmin) return;
    alert('Datos actualizados correctamente');
});

loadProfile();
</script>

</body>
</html>
