<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        .settings-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 3rem;
            align-items: start;
        }

        .settings-nav-card {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: sticky;
            top: 2rem;
        }

        .settings-nav-item {
            display: block;
            padding: 1.25rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }

        .settings-nav-item:last-child { border-bottom: none; }

        .settings-nav-item:hover, .settings-nav-item.active {
            background: var(--bg-alt);
            color: var(--primary);
        }

        .settings-nav-item.active {
            border-left: 4px solid var(--primary);
        }

        .settings-nav-item.logout {
            color: var(--error);
        }

        @media (max-width: 1024px) {
            .settings-layout { grid-template-columns: 1fr; }
            .settings-nav-card { position: static; display: flex; flex-wrap: wrap; }
            .settings-nav-item { border-bottom: none; border-right: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="app-sidebar">
        <div class="logo" style="color: white">Atlas<span style="color: var(--primary-light)">Bank</span></div>
        <nav class="sidebar-nav">
            <a href="/customer/dashboard.html" class="sidebar-link">📊 Dashboard</a>
            <a href="/customer/cuentas.html" class="sidebar-link">🏦 Cuentas</a>
            <a href="/customer/movimientos.html" class="sidebar-link">📄 Movimientos</a>
            <a href="/customer/transferencias.html" class="sidebar-link">💸 Transferencias</a>
            <a href="/customer/tarjetas.html" class="sidebar-link">💳 Tarjetas</a>
            <a href="/customer/ahorro_metas.html" class="sidebar-link">🌱 Metas de Ahorro</a>
            <a href="/customer/perfil.html" class="sidebar-link active">⚙️ Configuración</a>
        </nav>
        
        <div style="padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p id="userDisplay" style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; color: rgba(255,255,255,0.7);">Verified Identity</p>
            <button class="btn btn-outline" style="width: 100%; color: white; border-color: rgba(255,255,255,0.3); font-size: 0.75rem;" onclick="logout()">Terminate Session</button>
        </div>
    </aside>

    <main class="app-content">
        <header class="content-header">
            <div>
                <h1 style="font-size: 1.75rem;">Configuración de Cuenta</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Gestiona tus datos personales y preferencias de seguridad.</p>
            </div>
        </header>

        <div class="settings-layout animate-up">
            <aside class="settings-nav-card">
                <a href="/customer/perfil.html" class="settings-nav-item active">Datos Personales</a>
                <a href="/customer/seguridad.html" class="settings-nav-item">Seguridad y Llaves</a>
                <a href="/customer/privacidad.html" class="settings-nav-item">Privacidad</a>
            </aside>

            <section class="stat-card">
                <h2 style="font-size: 1.25rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">Datos Personales</h2>

                <form id="profileForm" class="flex flex-direction-column gap-4">
                    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label class="label">Nombre(s)</label>
                            <input type="text" id="firstName" class="form-control" disabled>
                        </div>
                        <div class="form-group">
                            <label class="label">Apellidos</label>
                            <input type="text" id="lastName" class="form-control" disabled>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label class="label">Teléfono Vinculado</label>
                        <input type="text" id="phone" class="form-control" placeholder="+57 ...">
                    </div>
                    
                    <div style="margin-top: 1rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                        <button type="submit" class="btn btn-primary" style="padding: 1rem 2.5rem;">Guardar Cambios</button>
                    </div>
                </form>
            </section>
        </div>
    </main>
</div>

<script>
const role = (sessionStorage.getItem('role') || '').toUpperCase();
const isAdmin = role === 'ADMIN' || role === 'EXECUTIVE';
const userId = isAdmin ? sessionStorage.getItem('adminUser') : sessionStorage.getItem('customerId');
const fullName = sessionStorage.getItem('fullName');

if (!userId) window.location.href = '/auth/login.html';

document.getElementById('userDisplay').textContent = fullName || userId;

function logout() {
    sessionStorage.clear();
    window.location.href = '/auth/login.html';
}

async function loadProfile() {
    try {
        if (isAdmin) {
            document.getElementById('firstName').value = 'Personal';
            document.getElementById('lastName').value = 'Bancario';
            document.getElementById('email').value = userId + "@atlasbank.com";
            document.getElementById('phone').value = 'SOPORTE INTERNO';
            document.getElementById('email').disabled = true;
            document.getElementById('phone').disabled = true;
            document.querySelector('button[type="submit"]').style.display = 'none';
        } else {
            const res = await fetch(`/api/customers/by-id/${userId}`);
            if (res.ok) {
                const customer = await res.json();
                document.getElementById('firstName').value = customer.firstName || customer.fullName.split(' ')[0] || '';
                document.getElementById('lastName').value = customer.lastName || customer.fullName.split(' ')[1] || '';
                document.getElementById('email').value = customer.email || '';
                document.getElementById('phone').value = customer.phone || '';
            }
        }
    } catch (err) { console.error(err); }
}

document.getElementById('profileForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (isAdmin) return;
    alert('Sus datos han sido actualizados y cifrados correctamente.');
});

loadProfile();
</script>
</body>
</html>
