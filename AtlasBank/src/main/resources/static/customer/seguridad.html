<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Seguridad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

<div class="app-container">
    <aside class="app-sidebar">
        <div class="logo" style="color: white">AtlasBank</div>
        <nav class="sidebar-nav">
            <a href="/customer/dashboard.html" class="sidebar-link">📊 Dashboard</a>
            <a href="/customer/cuentas.html" class="sidebar-link">🏦 Cuentas</a>
            <a href="/customer/movimientos.html" class="sidebar-link">📄 Movimientos</a>
            <a href="/customer/transferencias.html" class="sidebar-link">💸 Transferencias</a>
            <a href="/customer/tarjetas.html" class="sidebar-link">💳 Tarjetas</a>
            <a href="/customer/ahorro_metas.html" class="sidebar-link">🌱 Metas de Ahorro</a>
            <a href="/customer/perfil.html" class="sidebar-link active">⚙️ Configuración</a>
        </nav>
        <div style="margin-top: auto; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p id="userDisplay" style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; color: rgba(255,255,255,0.7);">Verified Identity</p>
            <button class="btn-outline" style="width: 100%; color: white; border-color: rgba(255,255,255,0.3); font-size: 0.75rem;" onclick="sessionStorage.clear(); window.location.href='/auth/login.html';">Cerrar Sesión</button>
        </div>
    </aside>

    <main class="app-content">
        <header class="content-header">
            <div>
                <h1 style="font-size: 2.5rem; letter-spacing: -2px;">Seguridad</h1>
                <p style="color: var(--gris-texto);">Gestiona tus llaves de acceso y protección de cuenta.</p>
            </div>
        </header>

        <div class="grid" style="grid-template-columns: 280px 1fr; gap: 40px;">
            <nav class="stat-card" style="padding: 0;">
                <a href="/customer/perfil.html" style="display: block; padding: 20px; border-bottom: 1px solid var(--gris-borde); font-weight: 600;">Datos Personales</a>
                <a href="/customer/seguridad.html" style="display: block; padding: 20px; border-bottom: 1px solid var(--gris-borde); font-weight: 600; background: var(--primario-soft); color: var(--primario);">Seguridad</a>
                <a href="/customer/privacidad.html" style="display: block; padding: 20px; font-weight: 600;">Privacidad</a>
            </nav>

            <section class="stat-card">
                <h2 style="font-size: 1.25rem; margin-bottom: 2rem; border-bottom: 1px solid var(--gris-borde); padding-bottom: 10px;">Cambiar Contraseña</h2>
                <form id="securityForm" class="flex flex-direction-column gap-4">
                    <div class="form-group">
                        <label>Contraseña Actual</label>
                        <input type="password" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Nueva Contraseña</label>
                        <input type="password" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Nueva Contraseña</label>
                        <input type="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary" style="align-self: flex-start;">Actualizar Contraseña</button>
                </form>
            </section>
        </div>
    </main>
</div>

<script>
const userId = sessionStorage.getItem('customerId');
if (!userId) window.location.href = '/auth/login.html';
document.getElementById('userDisplay').textContent = sessionStorage.getItem('fullName') || userId;

document.getElementById('securityForm').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('Contraseña actualizada (Simulado)');
});
</script>
</body>
</html>
