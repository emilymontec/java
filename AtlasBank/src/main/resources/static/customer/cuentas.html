<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Gestión de Cuentas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #15803d;
            --primario-soft: #f0fdf4;
            --negro: #111827;
            --blanco: #ffffff;
            --gris-borde: #e5e7eb;
            --gris-fondo: #f9fafb;
            --gris-texto: #4b5563;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--blanco); color: var(--negro); }

        header {
            padding: 20px 5%;
            border-bottom: 1px solid var(--gris-borde);
            display: flex; justify-content: space-between; align-items: center;
        }

        main { padding: 60px 8%; max-width: 1200px; margin: 0 auto; }

        .section-intro { margin-bottom: 60px; }
        .section-intro h1 { font-size: 3rem; letter-spacing: -2px; margin-bottom: 10px; }
        .section-intro p { color: var(--gris-texto); font-size: 1.1rem; }

        .accounts-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .account-card {
            border: 1px solid var(--negro);
            display: grid;
            grid-template-columns: 300px 1fr;
            transition: 0.3s;
        }

        .account-summary {
            padding: 40px;
            background: var(--negro);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .account-type { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--primario); }
        .account-balance { font-size: 2.2rem; font-weight: 600; margin: 20px 0; }
        .status-pill {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primario);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .account-details {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: var(--blanco);
        }

        .detail-group { position: relative; }
        .detail-group label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--gris-texto);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .detail-value {
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--gris-borde);
            padding: 4px 8px;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .copy-btn:hover { background: var(--negro); color: white; border-color: var(--negro); }

        .account-actions {
            grid-column: span 2;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px solid var(--gris-borde);
            display: flex;
            gap: 20px;
        }
        .action-link { text-decoration: none; color: var(--negro); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; border-bottom: 2px solid var(--primario); padding-bottom: 2px; }
        .action-link:hover { color: var(--primario); }

        .create-account-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--gris-borde);
        }
        .btn-create {
            padding: 18px 40px;
            background: var(--primario);
            color: white;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-create:hover { background: var(--negro); }

        /* Modal Sistema - Estilo Exito/Fallo */
        #systemModal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(17, 24, 39, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }
        .system-modal-content {
            background: white; padding: 60px 40px; max-width: 500px; width: 95%;
            text-align: center; border-radius: 0; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        #modalIcon { font-size: 5rem; line-height: 1; margin-bottom: 20px; display: block; }
        .success-type #modalIcon { color: var(--primario); }
        .error-type #modalIcon { color: #b91c1c; }
        
        #modalLabel { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        .success-type #modalLabel { color: var(--primario); }
        .error-type #modalLabel { color: #b91c1c; }

        #modalTitle { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 20px; line-height: 1; color: var(--negro); text-transform: uppercase; }
        #modalMsg { color: var(--gris-texto); margin-bottom: 40px; font-size: 1rem; line-height: 1.5; }
        
        .btn-modal {
            padding: 18px 45px; background: var(--negro); color: white;
            border: none; font-weight: 600; text-transform: uppercase;
            cursor: pointer; font-size: 0.8rem; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-modal:hover { background: var(--primario); }

        @media (max-width: 900px) {
            .account-card { grid-template-columns: 1fr; }
            .account-details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" style="font-weight: 600; font-size: 1.1rem; letter-spacing: -0.5px;">AtlasBank / <span style="font-weight: 300; color: var(--gris-texto);">MIS CUENTAS</span></div>
    <a href="/customer/dashboard.html" class="back-link" style="text-decoration:none; color:var(--negro); font-size:0.8rem; font-weight:600; text-transform:uppercase;">← Volver al Dashboard</a>
</header>

<main>
    <section class="section-intro">
        <p style="color: var(--primario); font-weight: 600; margin-bottom: 10px;">[ ÁREA DE PRODUCTOS ]</p>
        <h1>Mis Cuentas</h1>
        <p id="customerIdDisplay" style="font-size: 0.8rem; font-weight: 600; opacity: 0.6; margin-bottom: 10px;"></p>
        <p>Resumen detallado de tus activos y credenciales de sistema.</p>
    </section>

    <div id="accountsContainer" class="accounts-container">
    </div>

    <div class="create-account-section">
        <h2 style="font-size: 1.5rem; margin-bottom: 20px;">Abrir Nueva Cuenta</h2>
        <form id="createAccountForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div class="form-group">
                    <label>Tipo de Cuenta</label>
                    <select id="accountType" style="width: 100%; padding: 15px; border: 1px solid var(--gris-borde); font-size: 1rem;">
                        <option value="SAVINGS">Ahorro</option>
                        <option value="CHECKING">Corriente</option>
                        <option value="INVESTMENT">Inversión</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Monto Inicial</label>
                    <input type="number" id="initialBalance" placeholder="0.00" step="0.01" value="0" style="width: 100%; padding: 15px; border: 1px solid var(--gris-borde); font-size: 1rem;">
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button type="submit" class="btn-create" style="width: 100%;">Crear Cuenta</button>
                </div>
            </div>
        </form>
    </div>
</main>

<div id="systemModal">
    <div class="system-modal-content" id="modalFrame">
        <div id="modalIcon">✓</div>
        <span id="modalLabel">[ OPERACIÓN EXITOSA ]</span>
        <h1 id="modalTitle">Título</h1>
        <p id="modalMsg">Mensaje de sistema.</p>
        <button class="btn-modal" onclick="closeSystemModal()">Entendido</button>
    </div>
</div>

<script>
async function loadAccounts() {
    const customerId = sessionStorage.getItem('customerId');
    if (!customerId) {
        window.location.href = '/auth/login.html';
        return;
    }

    document.getElementById('customerIdDisplay').textContent = 'ID: ' + customerId;

    try {
        const res = await fetch(`/api/accounts/customer/${customerId}`);
        if (res.ok) {
            const accounts = await res.json();
            const container = document.getElementById('accountsContainer');
            container.innerHTML = '';

            accounts.forEach(acc => {
                const card = document.createElement('article');
                card.className = 'account-card';
                card.innerHTML = `
                    <div class="account-summary">
                        <div>
                            <span class="account-type">${acc.accountType}</span>
                            <h2 class="account-balance">$${acc.balance.toFixed(2)}</h2>
                        </div>
                        <div>
                            <span class="status-pill">Estatus: Activo</span>
                        </div>
                    </div>
                    <div class="account-details">
                        <div class="detail-group">
                            <label>ID de Cuenta</label>
                            <p class="detail-value">${acc.id}</p>
                        </div>
                        <div class="detail-group">
                            <label>Tipo</label>
                            <p class="detail-value">${acc.accountType}</p>
                        </div>
                        <div class="detail-group">
                            <label>Número de Cuenta</label>
                            <p class="detail-value">${acc.accountNumber} <button class="copy-btn" onclick="navigator.clipboard.writeText('${acc.accountNumber}')">Copiar</button></p>
                        </div>
                        <div class="detail-group">
                            <label>CLAVE</label>
                            <p class="detail-value">${acc.clabe || 'N/A'} <button class="copy-btn" onclick="navigator.clipboard.writeText('${acc.clabe || ''}')">Copiar</button></p>
                        </div>
                        <div class="account-actions">
                            <a href="/customer/movimientos.html" class="action-link">Ver Extractos</a>
                            <a href="/customer/transferencias.html" class="action-link">Realizar Transferencia</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    } catch (err) {
        console.error('Error loading accounts:', err);
    }
}

function showSystemModal(title, msg, type = 'success') {
    const frame = document.getElementById('modalFrame');
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent = msg;
    
    if (type === 'success') {
        frame.className = 'system-modal-content success-type';
        document.getElementById('modalIcon').textContent = '✓';
        document.getElementById('modalLabel').textContent = '[ OPERACIÓN EXITOSA ]';
    } else {
        frame.className = 'system-modal-content error-type';
        document.getElementById('modalIcon').textContent = '✕';
        document.getElementById('modalLabel').textContent = '[ ERROR DE SISTEMA ]';
    }
    
    document.getElementById('systemModal').style.display = 'flex';
}

function closeSystemModal() {
    document.getElementById('systemModal').style.display = 'none';
}

document.getElementById('createAccountForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const customerId = sessionStorage.getItem('customerId');
    const accountType = document.getElementById('accountType').value;
    const initialBalance = parseFloat(document.getElementById('initialBalance').value) || 0;

    try {
        const res = await fetch('/api/accounts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customerId, accountType, initialBalance })
        });

        if (res.ok) {
            showSystemModal('Cuenta Creada', 'Tu nuevo producto ha sido activado exitosamente.', 'success');
            loadAccounts();
            document.getElementById('createAccountForm').reset();
        } else {
            let errorMsg = 'No se pudo procesar la apertura de cuenta.';
            try {
                const errData = await res.json();
                errorMsg = errData.message || errorMsg;
            } catch(e) {}
            showSystemModal('Error de Solicitud', errorMsg, 'error');
        }
    } catch (err) {
        showSystemModal('Error de Conexión', 'El servidor no responde. Intenta más tarde.', 'error');
    }
});

loadAccounts();
</script>

</body>
</html>
