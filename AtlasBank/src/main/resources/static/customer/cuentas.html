<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Gestión de Cuentas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        .accounts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .account-card {
            display: grid;
            grid-template-columns: 280px 1fr;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-main);
            box-shadow: var(--shadow-sm);
        }

        .account-summary {
            padding: 2rem;
            background: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .account-details {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .status-pill {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: var(--radius-sm);
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .account-card { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="app-sidebar">
        <div class="logo" style="color: white">Atlas<span style="color: var(--primary-light)">Bank</span></div>
        <nav class="sidebar-nav">
            <a href="/customer/dashboard.html" class="sidebar-link">📊 Dashboard</a>
            <a href="/customer/cuentas.html" class="sidebar-link active">🏦 Cuentas</a>
            <a href="/customer/movimientos.html" class="sidebar-link">📄 Movimientos</a>
            <a href="/customer/transferencias.html" class="sidebar-link">💸 Transferencias</a>
            <a href="/customer/tarjetas.html" class="sidebar-link">💳 Tarjetas</a>
            <a href="/customer/ahorro_metas.html" class="sidebar-link">🌱 Metas de Ahorro</a>
            <a href="/customer/perfil.html" class="sidebar-link">⚙️ Configuración</a>
        </nav>
        
        <div style="padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p id="userDisplay" style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; color: rgba(255,255,255,0.7);">Verified Identity</p>
            <button class="btn btn-outline" style="width: 100%; color: white; border-color: rgba(255,255,255,0.3); font-size: 0.75rem;" onclick="logout()">Terminate Session</button>
        </div>
    </aside>

    <main class="app-content">
        <header class="content-header">
            <div>
                <h1 style="font-size: 1.75rem;">Mis Cuentas Bancarias</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Resumen detallado de tus activos y credenciales de sistema.</p>
            </div>
            <button onclick="document.getElementById('createAccountSection').scrollIntoView({behavior: 'smooth'})" class="btn btn-primary">Nueva Cuenta</button>
        </header>

        <div id="accountsContainer" class="accounts-grid animate-up">
            <!-- Cuentas se cargan aquí -->
        </div>

        <section id="createAccountSection" class="stat-card animate-up" style="margin-top: 4rem; max-width: 800px;">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Solicitar Nueva Cuenta</h2>
            <form id="createAccountForm" class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label class="label">Tipo de Cuenta</label>
                    <select id="accountType" class="form-control">
                        <option value="SAVINGS">Ahorro</option>
                        <option value="CHECKING">Corriente</option>
                        <option value="INVESTMENT">Inversión</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="label">Monto Inicial (USD)</label>
                    <input type="number" id="initialBalance" class="form-control" placeholder="0.00" step="0.01" value="0">
                </div>
                <div style="grid-column: span 2;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Confirmar Apertura</button>
                </div>
            </form>
        </section>
    </main>
</div>

<!-- Modal de Sistema -->
<div id="systemModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
    <div class="stat-card" style="max-width: 400px; text-align: center; padding: 3rem;">
        <div id="modalIcon" style="font-size: 4rem; margin-bottom: 1rem;"></div>
        <h2 id="modalTitle" style="margin-bottom: 1rem;"></h2>
        <p id="modalMsg" style="color: var(--text-muted); margin-bottom: 2rem;"></p>
        <button onclick="closeModal()" class="btn btn-primary" style="width: 100%;">Entendido</button>
    </div>
</div>

<script>
const customerId = sessionStorage.getItem('customerId');
const fullName = sessionStorage.getItem('fullName');

if (!customerId) window.location.href = '/auth/login.html';

document.getElementById('userDisplay').textContent = fullName || customerId;

function logout() {
    sessionStorage.clear();
    window.location.href = '/auth/login.html';
}

async function loadAccounts() {
    try {
        const res = await fetch(`/api/accounts/customer/${customerId}`);
        if (res.ok) {
            const accounts = await res.json();
            const container = document.getElementById('accountsContainer');
            container.innerHTML = '';
            
            accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'account-card';
                card.innerHTML = `
                    <div class="account-summary">
                        <div>
                            <span class="status-pill">${acc.type}</span>
                            <div style="font-size: 2rem; font-weight: 700; margin-top: 1rem;">$${acc.balance.toFixed(2)}</div>
                            <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 0.5rem;">Balance Certificado</div>
                        </div>
                        <div class="badge badge-success" style="align-self: flex-start;">ACTIVA</div>
                    </div>
                    <div class="account-details">
                        <div class="detail-group">
                            <label class="label">Número de Cuenta</label>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <strong>${acc.accountNumber}</strong>
                                <button class="btn btn-ghost" style="padding: 0.25rem;" onclick="copyText('${acc.accountNumber}')">📋</button>
                            </div>
                        </div>
                        <div class="detail-group">
                            <label class="label">ID de Sistema</label>
                            <div>#${acc.id}</div>
                        </div>
                        <div style="grid-column: span 2; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; gap: 1rem;">
                            <a href="/customer/movimientos.html?account=${acc.id}" class="btn btn-outline" style="font-size: 0.75rem;">Ver Historial</a>
                            <a href="/customer/transferencias.html?from=${acc.id}" class="btn btn-primary" style="font-size: 0.75rem;">Transferir</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    } catch (err) { console.error(err); }
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    alert('Copiado al portapapeles');
}

function showModal(title, msg, type) {
    const modal = document.getElementById('systemModal');
    const icon = document.getElementById('modalIcon');
    icon.innerHTML = type === 'success' ? '✅' : '❌';
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent = msg;
    modal.style.display = 'flex';
}

function closeModal() {
    document.getElementById('systemModal').style.display = 'none';
}

document.getElementById('createAccountForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const type = document.getElementById('accountType').value;
    const initialBalance = parseFloat(document.getElementById('initialBalance').value);

    try {
        const res = await fetch('/api/accounts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customerId, type, initialBalance })
        });
        if (res.ok) {
            showModal('¡ÉXITO!', 'Tu nueva cuenta ha sido creada y certificada.', 'success');
            loadAccounts();
        } else {
            showModal('ERROR', 'No se pudo procesar la solicitud de apertura.', 'error');
        }
    } catch (err) {
        showModal('FALLO DE RED', 'Error de comunicación con el nodo central.', 'error');
    }
});

loadAccounts();
</script>
</body>
</html>
