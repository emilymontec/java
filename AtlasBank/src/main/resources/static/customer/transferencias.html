<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Nueva Transferencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        :root {
            --primario: #15803d;
            --primario-soft: #f0fdf4;
            --negro: #111827;
            --blanco: #ffffff;
            --gris-borde: #e5e7eb;
            --gris-texto: #4b5563;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--blanco); color: var(--negro); }

        header {
            padding: 20px 5%;
            border-bottom: 1px solid var(--gris-borde);
            display: flex; justify-content: space-between; align-items: center;
        }

        .transfer-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            min-height: calc(100vh - 76px);
        }

        .form-section {
            padding: 60px 10%;
            border-right: 1px solid var(--gris-borde);
        }
        .step-indicator { font-size: 0.7rem; font-weight: 600; color: var(--primario); margin-bottom: 10px; display: block; }
        h1 { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 40px; }

        .input-group { margin-bottom: 35px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 12px; color: var(--gris-texto); }

        select, input {
            width: 100%;
            padding: 18px;
            border: 1px solid var(--gris-borde);
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
            background: var(--blanco);
        }
        select:focus, input:focus { border-color: var(--primario); border-width: 2px; }

        .amount-input { font-size: 2rem; font-weight: 600; color: var(--primario); }

        .summary-panel {
            background: var(--primario-soft);
            padding: 60px 40px;
            display: flex; flex-direction: column;
        }
        .summary-card {
            background: var(--blanco);
            padding: 30px;
            border: 1px solid var(--primario);
            margin-bottom: auto;
        }
        .summary-card h2 { font-size: 0.8rem; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid var(--gris-borde); padding-bottom: 10px; }

        .summary-item { margin-bottom: 20px; }
        .summary-item label { margin-bottom: 4px; color: var(--gris-texto); }
        .summary-item p { font-weight: 600; font-size: 1rem; }

        .btn-confirm {
            width: 100%;
            padding: 20px;
            background: var(--primario);
            color: white;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-confirm:hover { background: var(--negro); }

        #modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }
        .confirm-modal {
            background: white;
            padding: 50px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        #systemModal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(17, 24, 39, 0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(4px);
        }
        .system-modal-content {
            background: white; padding: 40px; max-width: 450px; width: 90%;
            text-align: center; border-radius: 2px; border: 1px solid var(--negro);
        }

        @media (max-width: 900px) {
            .transfer-grid { grid-template-columns: 1fr; }
            .form-section { border-right: none; border-bottom: 1px solid var(--gris-borde); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><a href="/customer/dashboard.html">AtlasBank</a></div>
    <a href="/customer/dashboard.html" style="text-decoration: none; color: var(--negro); font-size: 0.8rem; font-weight: 600; text-transform: uppercase;">← Volver</a>
</header>

<main class="transfer-grid">
    <section class="form-section">
        <span class="step-indicator">PASO 01 / CONFIGURACIÓN</span>
        <h1>Nueva Transferencia</h1>

        <form id="transferForm">
            <div class="input-group">
                <label>Cuenta de Origen</label>
                <select id="sourceAccount" required>
                    <option value="">Selecciona una cuenta</option>
                </select>
            </div>

            <div class="input-group">
                <label>Cuenta de Destino (ID / Número)</label>
                <input type="text" id="destinationAccount" placeholder="ID de cuenta o número de cuenta" required>
            </div>

            <div class="input-group">
                <label>Monto a transferir (USD)</label>
                <input type="number" id="amount" class="amount-input" placeholder="0.00" step="0.01" min="0.01" required>
            </div>

            <div class="input-group">
                <label>Concepto de pago</label>
                <input type="text" id="description" placeholder="ej. Pago de Renta">
            </div>

            <div class="input-group" style="background: var(--primario-soft); padding: 20px;">
                <label style="color: var(--primario);">[ SEGURIDAD ] Ubicación de Transacción</label>
                <select id="location">
                    <option value="Colombia">Colombia (Ubicación Habitual)</option>
                    <option value="Rusia">Rusia (Riesgo Alto)</option>
                    <option value="Islas Caiman">Islas Caimán (Paraíso Fiscal)</option>
                </select>
            </div>
        </form>
    </section>

    <aside class="summary-panel">
        <div class="summary-card">
            <h2>Vista Previa</h2>
            <div class="summary-item">
                <label>Destinatario</label>
                <p id="sum-dest">No especificado</p>
            </div>
            <div class="summary-item">
                <label>Importe</label>
                <p id="sum-amount">$0.00</p>
            </div>
            <div style="border-top: 1px solid var(--negro); padding-top: 15px; margin-top: 10px;">
                <label style="color: var(--negro);">TOTAL A DEBITAR</label>
                <p id="sum-total" style="font-size: 1.5rem; color: var(--primario);">$0.00</p>
            </div>
        </div>

        <button type="button" class="btn-confirm" onclick="showConfirmModal()">Confirmar Envío</button>
    </aside>
</main>

<div id="modal-overlay">
    <div class="confirm-modal">
        <h3>¿Confirmar envío?</h3>
        <p style="color: var(--gris-texto); margin-bottom: 20px;">Esta operación es irreversible.</p>
        <div style="background: var(--primario-soft); padding: 20px; text-align: left; margin-bottom: 20px;">
            <p><small>DESTINO:</small><br><strong id="modal-dest">---</strong></p>
            <p style="margin-top: 10px;"><small>MONTO:</small><br><strong id="modal-amount" style="font-size: 1.2rem; color: var(--primario);">$0.00</strong></p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="hideConfirmModal()" style="flex: 1; padding: 15px; border: 1px solid var(--negro); background: none; font-weight: 600; cursor: pointer;">Corregir</button>
            <button onclick="executeTransfer()" style="flex: 2; padding: 15px; background: var(--primario); color: white; border: none; font-weight: 600; cursor: pointer;">Enviar</button>
        </div>
    </div>
</div>

<div id="systemModal">
    <div class="system-modal-content">
        <span id="sysModalIcon" style="font-size: 3rem; display: block; margin-bottom: 15px;">✅</span>
        <h3 id="sysModalTitle">Título</h3>
        <p id="sysModalMsg">Mensaje.</p>
        <button onclick="closeSystemModal()" style="padding: 12px 30px; background: var(--negro); color: white; border: none; font-weight: 600; cursor: pointer;">Entendido</button>
    </div>
</div>

<script>
const customerId = sessionStorage.getItem('customerId');
if (!customerId) window.location.href = '/auth/login.html';

async function loadAccounts() {
    try {
        const res = await fetch(`/api/accounts/customer/${customerId}`);
        if (res.ok) {
            const accounts = await res.json();
            const select = document.getElementById('sourceAccount');
            accounts.forEach(acc => {
                const opt = document.createElement('option');
                opt.value = acc.id;
                opt.textContent = `${acc.accountNumber} ($${acc.balance.toFixed(2)})`;
                select.appendChild(opt);
            });
        }
    } catch (err) { console.error(err); }
}

document.getElementById('destinationAccount').addEventListener('input', (e) => {
    document.getElementById('sum-dest').textContent = e.target.value || 'No especificado';
});

document.getElementById('amount').addEventListener('input', (e) => {
    const val = parseFloat(e.target.value) || 0;
    const formatted = '$' + val.toLocaleString('es-MX', { minimumFractionDigits: 2 });
    document.getElementById('sum-amount').textContent = formatted;
    document.getElementById('sum-total').textContent = formatted;
});

function showConfirmModal() {
    const form = document.getElementById('transferForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    document.getElementById('modal-dest').textContent = document.getElementById('destinationAccount').value;
    document.getElementById('modal-amount').textContent = document.getElementById('sum-total').textContent;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function hideConfirmModal() {
    document.getElementById('modal-overlay').style.display = 'none';
}

function showSystemModal(title, msg, type = 'success') {
    document.getElementById('sysModalTitle').textContent = title;
    document.getElementById('sysModalMsg').textContent = msg;
    document.getElementById('sysModalIcon').textContent = type === 'success' ? '✅' : '❌';
    document.getElementById('systemModal').style.display = 'flex';
}

function closeSystemModal() {
    document.getElementById('systemModal').style.display = 'none';
    if (document.getElementById('sysModalIcon').textContent === '✅') {
        window.location.href = '/customer/dashboard.html';
    }
}

async function executeTransfer() {
    const payload = {
        sourceAccountId: parseInt(document.getElementById('sourceAccount').value),
        targetAccountId: parseInt(document.getElementById('destinationAccount').value), // Assuming ID for now
        amount: parseFloat(document.getElementById('amount').value),
        description: document.getElementById('description').value || 'Transferencia AtlasBank'
    };

    hideConfirmModal();

    try {
        const res = await fetch('/api/transactions/transfer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            showSystemModal('TRANSFERENCIA EXITOSA', 'Los fondos han sido enviados y validados por el nodo central.', 'success');
        } else {
            const err = await res.json();
            showSystemModal('OPERACIÓN FALLIDA', err.message || 'No se pudo procesar la transferencia.', 'error');
        }
    } catch (err) {
        showSystemModal('ERROR DE RED', 'Fallo en la comunicación con el servidor.', 'error');
    }
}

loadAccounts();
</script>
</body>
</html>
