<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Historial de Movimientos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #15803d;
            --primario-soft: #f0fdf4;
            --negro: #111827;
            --blanco: #ffffff;
            --gris-borde: #e5e7eb;
            --gris-fondo: #f9fafb;
            --gris-texto: #6b7280;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--blanco); color: var(--negro); }

        header {
            padding: 20px 5%;
            border-bottom: 1px solid var(--gris-borde);
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-meta { font-size: 0.75rem; font-weight: 600; color: var(--gris-texto); }

        main { padding: 40px 5%; }

        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 40px;
        }
        .page-header h1 { font-size: 3rem; letter-spacing: -2px; line-height: 1; }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            padding: 20px;
            background: var(--gris-fondo);
            border: 1px solid var(--gris-borde);
            margin-bottom: 2px;
        }

        .filters { display: flex; gap: 20px; align-items: center; }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--gris-texto); }

        select, input[type="date"] {
            padding: 8px 12px;
            border: 1px solid var(--gris-borde);
            background: white;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: var(--primario); }

        .export-tools { display: flex; gap: 10px; }
        .btn-tool {
            padding: 10px 20px;
            border: 1px solid var(--negro);
            background: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-tool:hover { background: var(--negro); color: white; }
        .btn-tool.pdf { border-color: var(--primario); color: var(--primario); }
        .btn-tool.pdf:hover { background: var(--primario); color: white; }

        .table-container { border: 1px solid var(--gris-borde); }
        table { width: 100%; border-collapse: collapse; }

        thead { background: var(--negro); color: white; }
        th { text-align: left; padding: 15px 20px; font-size: 0.75rem; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }

        tbody tr { border-bottom: 1px solid var(--gris-borde); transition: 0.2s; }
        tbody tr:hover { background: var(--primario-soft); }

        td { padding: 20px; font-size: 0.95rem; }

        .date-cell { color: var(--gris-texto); font-size: 0.85rem; width: 120px; }
        .type-tag { font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border: 1px solid; text-transform: uppercase; }
        .type-in { color: var(--primario); border-color: var(--primario); }
        .type-out { color: var(--negro); border-color: var(--negro); }

        .amount-cell { font-weight: 600; text-align: right; font-size: 1.1rem; }
        .amount-in { color: var(--primario); }

        .pagination {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border: 1px solid var(--gris-borde); border-top: none;
            font-size: 0.8rem; font-weight: 600;
        }
        .page-link { color: var(--negro); text-decoration: none; margin: 0 10px; }
        .page-link.active { color: var(--primario); text-decoration: underline; }

        @media (max-width: 900px) {
            .toolbar { grid-template-columns: 1fr; }
            .filters { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">AtlasBank</div>
    <div class="nav-meta">USUARIO: <span id="customerIdDisplay">---</span> / ESTADO: CONECTADO</div>
</header>

<main>
    <div class="page-header">
        <div>
            <p style="color: var(--primario); font-weight: 600; margin-bottom: 5px;">[ CONSULTA DE ACTIVIDAD ]</p>
            <h1>Movimientos</h1>
        </div>
        <div style="text-align: right;">
            <p class="nav-meta">SALDO ACTUAL</p>
            <p id="currentBalance" style="font-size: 1.8rem; font-weight: 600;">$0.00</p>
        </div>
    </div>

    <section class="toolbar">
        <div class="filters">
            <div class="filter-group">
                <label>Desde</label>
                <input type="date" id="dateFrom">
            </div>
            <div class="filter-group">
                <label>Hasta</label>
                <input type="date" id="dateTo">
            </div>
            <div class="filter-group">
                <label>Tipo</label>
                <select id="typeFilter">
                    <option value="">Todos los flujos</option>
                    <option value="DEPOSIT">Ingresos (+)</option>
                    <option value="WITHDRAWAL">Egresos (-)</option>
                </select>
            </div>
        </div>

        <div class="export-tools">
            <button class="btn-tool" onclick="exportCSV()">Exportar CSV</button>
            <button class="btn-tool pdf" onclick="alert('Generando PDF de movimientos...')">Generar PDF</button>
        </div>
    </section>

    <section class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Concepto / Referencia</th>
                    <th>Estado</th>
                    <th style="text-align: right;">Monto</th>
                </tr>
            </thead>
            <tbody id="transactionsBody">
            </tbody>
        </table>
    </section>

    <div class="pagination">
        <span>Mostrando <span id="txCount">0</span> transacciones</span>
        <div>
            <a href="#" class="page-link active">1</a>
        </div>
    </div>
</main>

<script>
const customerId = sessionStorage.getItem('customerId');
if (!customerId) window.location.href = 'login.html';

document.getElementById('customerIdDisplay').textContent = customerId;

let allTransactions = [];

async function loadTransactions() {
    try {
        const accRes = await fetch(`/api/accounts/customer/${customerId}`);
        if (accRes.ok) {
            const accounts = await accRes.json();
            if (accounts.length > 0) {
                document.getElementById('currentBalance').textContent = '$' + accounts[0].balance.toFixed(2);
            }
        }

        const res = await fetch('/api/transactions');
        if (res.ok) {
            allTransactions = await res.json();
            renderTransactions();
        }
    } catch (err) {
        console.error('Error loading transactions:', err);
    }
}

function renderTransactions() {
    const tbody = document.getElementById('transactionsBody');
    tbody.innerHTML = '';

    allTransactions.forEach(tx => {
        const tr = document.createElement('tr');
        const isDeposit = tx.transactionType === 'DEPOSIT';
        const date = new Date(tx.timestamp);

        tr.innerHTML = `
            <td class="date-cell">${date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase()}</td>
            <td><span class="type-tag ${isDeposit ? 'type-in' : 'type-out'}">${isDeposit ? 'Ingreso' : 'Egreso'}</span></td>
            <td>${tx.description || tx.transactionType}<br><small style="color: var(--gris-texto);">REF: ${tx.id || tx.transactionType}</small></td>
            <td><small>COMPLETADO</small></td>
            <td class="amount-cell ${isDeposit ? 'amount-in' : ''}">${isDeposit ? '+' : '-'}$${tx.amount.toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById('txCount').textContent = allTransactions.length;
}

function exportCSV() {
    let csv = 'Fecha,Tipo,Concepto,Monto\n';
    allTransactions.forEach(tx => {
        const isDeposit = tx.transactionType === 'DEPOSIT';
        csv += `${new Date(tx.timestamp).toISOString()},${tx.transactionType},${tx.description || ''},${isDeposit ? '+' : '-'}${tx.amount}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'movimientos_atlasbank.csv';
    a.click();
}

document.getElementById('typeFilter').addEventListener('change', function() {
    const type = this.value;
    if (type) {
        renderTransactions();
    }
});

loadTransactions();
</script>

</body>
</html>
