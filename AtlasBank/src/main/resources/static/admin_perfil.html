<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank Admin | Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #15803d;
            --primario-soft: #f0fdf4;
            --alerta: #b91c1c;
            --negro: #111827;
            --blanco: #ffffff;
            --gris-borde: #e5e7eb;
            --gris-fondo: #f9fafb;
            --gris-texto: #6b7280;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--gris-fondo); color: var(--negro); font-size: 13px; }

        header {
            background: var(--negro); color: white;
            padding: 10px 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .sys-status { font-size: 0.65rem; letter-spacing: 1px; color: var(--primario); font-weight: 600; }

        .admin-wrapper { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

        aside { background: var(--blanco); border-right: 1px solid var(--gris-borde); padding: 30px 20px; }
        .menu-label { font-size: 0.65rem; font-weight: 700; color: var(--gris-texto); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .menu-link { display: block; padding: 10px 0; text-decoration: none; color: var(--negro); font-weight: 500; border-bottom: 1px solid var(--gris-fondo); }
        .menu-link:hover { color: var(--primario); }
        .menu-link.active { color: var(--primario); border-right: 3px solid var(--primario); }

        section { padding: 40px; }

        .profile-card { background: white; border: 1px solid var(--gris-borde); padding: 40px; max-width: 600px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .avatar-circle { width: 60px; height: 60px; background: var(--negro); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 600; border-radius: 50%; }
        
        .form-section { margin-top: 30px; border-top: 1px solid var(--gris-fondo); pt: 30px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--gris-texto); }
        input { padding: 12px; border: 1px solid var(--gris-borde); outline: none; font-size: 0.95rem; }
        input:focus { border-color: var(--primario); }
        input[disabled] { background: var(--gris-fondo); color: var(--gris-texto); border-color: transparent; }

        .btn-action { padding: 15px; background: var(--negro); color: white; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-action:hover { background: var(--primario); }

        .role-badge { padding: 4px 8px; font-size: 0.65rem; font-weight: 700; background: var(--primario-soft); color: var(--primario); border: 1px solid var(--primario); border-radius: 4px; }

        @media (max-width: 900px) {
            .admin-wrapper { grid-template-columns: 1fr; }
            aside { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div>AtlasBank Admin</div>
    <div class="sys-status"><span id="currentDate"></span></div>
</header>

<div class="admin-wrapper">
    <aside>
        <span class="menu-label">Navegación</span>
        <a href="panel_admin.html" class="menu-link">Dashboard Principal</a>
        
        <br>
        <span class="menu-label">Gestión de Usuarios</span>
        <a href="admin_directorio.html" class="menu-link">Directorio General</a>
        <a href="admin_aprobaciones.html" class="menu-link">Aprobaciones (<span id="pendingCount">0</span>)</a>

        <br>
        <span class="menu-label">Operaciones</span>
        <a href="admin_transacciones.html" class="menu-link">Monitor Financiero</a>
        <a href="admin_simulador.html" class="menu-link">Simulador de Depósito</a>

        <br>
        <span class="menu-label">Seguridad y Cuenta</span>
        <a href="admin_seguridad.html" class="menu-link">Control de Seguridad</a>
        <a href="admin_perfil.html" class="menu-link active">Mi Perfil</a>

        <br>
        <span class="menu-label">Sistema</span>
        <a href="#" onclick="sessionStorage.clear(); window.location.href='login.html'; return false;" class="menu-link" style="color: #b91c1c;">Cerrar Sesión</a>
    </aside>

    <section>
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-circle" id="avatarInitials">AD</div>
                <div>
                    <h2 id="displayUsername">ADMIN</h2>
                    <span id="roleBadge" class="role-badge">ADMINISTRADOR</span>
                </div>
            </div>

            <div class="form-group">
                <label>Nombre de Usuario (ID Interno)</label>
                <input type="text" id="username" disabled>
            </div>

            <div class="form-section">
                <h3 style="margin-bottom: 20px; font-size: 1rem;">Cambiar Contraseña Acceso</h3>
                <form id="passwordForm">
                    <div class="form-group">
                        <label>Contraseña Actual</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Nueva Contraseña</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-action">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </section>
</div>

<script>
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();

async function loadData() {
    const username = sessionStorage.getItem('adminUser');
    const role = sessionStorage.getItem('role');
    
    if (!username) { window.location.href = 'login.html'; return; }

    document.getElementById('username').value = username;
    document.getElementById('displayUsername').textContent = username.toUpperCase();
    document.getElementById('roleBadge').textContent = role || 'ADMIN';
    document.getElementById('avatarInitials').textContent = username.substring(0, 2).toUpperCase();

    try {
        const statsRes = await fetch('/api/admin/stats');
        if (statsRes.ok) {
            const stats = await statsRes.json();
            document.getElementById('pendingCount').textContent = stats.pendingAccounts;
        }
    } catch (err) { console.error(err); }
}

document.getElementById('passwordForm').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('Funcionalidad de cambio de contraseña completada. Por seguridad, la sesión se reiniciará.');
    sessionStorage.clear();
    window.location.href = 'login.html';
});

loadData();
</script>
</body>
</html>
