<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Institutional Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        body {
            background-color: var(--bg-alt);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 50px;
            border-radius: var(--radius-md);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            background: white;
            border: 1px solid var(--border);
            position: relative;
        }

        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--primary);
        }

        .brand-header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: var(--bg-dark);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .error-msg {
            background: #fef2f2;
            color: #991b1b;
            padding: 15px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            margin-bottom: 25px;
            display: none;
            border: 1px solid #fee2e2;
        }

        .login-footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .bg-decoration {
            position: fixed;
            font-size: 30vw;
            font-weight: 800;
            color: rgba(0,0,0,0.01);
            z-index: -1;
            bottom: -10vw;
            left: -5vw;
            letter-spacing: -2vw;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

<div class="bg-decoration">ATLAS</div>

<div class="login-card animate-up">
    <div class="brand-header">
        <div class="logo" style="margin-bottom: 15px;">Atlas<span>Bank</span></div>
        <p class="subtitle">Secure institutional session terminal.</p>
    </div>

    <div id="errorMessage" class="error-msg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label class="label" for="customerId">User Digital ID</label>
            <input type="text" id="customerId" class="form-control" style="border-radius: var(--radius-sm);" placeholder="Identification Number" required>
        </div>

        <div class="form-group">
            <label class="label" for="password">Security Protocol Key</label>
            <input type="password" id="password" class="form-control" style="border-radius: var(--radius-sm);" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: var(--radius-sm);">
            Execute Authentication
        </button>
    </form>

    <div class="login-footer">
        <a href="#" class="nav-link">Access Recovery</a>
        <a href="/auth/registro.html" class="nav-link" style="color: var(--primary); font-weight: 700;">Establish Account</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const originalText = btn.textContent;
    
    btn.disabled = true;
    btn.textContent = 'Verifying...';

    const username = document.getElementById('customerId').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMessage');
    errorMsg.style.display = 'none';

    try {
        const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (response.ok) {
            const data = await response.json();
            sessionStorage.setItem('adminUser', username);
            sessionStorage.setItem('role', (data.role || '').toUpperCase());
            window.location.href = '/admin/panel_admin.html';
            return;
        }

        const customerRes = await fetch('/api/customers/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customerId: username, password })
        });

        if (customerRes.ok) {
            const data = await customerRes.json();
            sessionStorage.setItem('customerId', username);
            sessionStorage.setItem('fullName', data.fullName || username);
            sessionStorage.setItem('role', (data.role || 'USER').toUpperCase());
            window.location.href = '/customer/dashboard.html';
        } else {
            errorMsg.textContent = 'Invalid credentials. Access denied.';
            errorMsg.style.display = 'block';
        }
    } catch (err) {
        errorMsg.textContent = 'Network communication failure. Intricate error.';
        errorMsg.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
});
</script>
</body>
</html>
