<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Registro de Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #15803d;
            --negro: #111827;
            --blanco: #ffffff;
            --gris-borde: #e5e7eb;
            --gris-texto: #6b7280;
            --fondo: #f9fafb;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--fondo); color: var(--negro); }

        header {
            padding: 20px 5%;
            border-bottom: 1px solid var(--gris-borde);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--blanco);
        }
        .back-link { text-decoration: none; color: var(--negro); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }

        main { padding: 60px 5%; max-width: 600px; margin: 0 auto; }
        .form-card {
            background: var(--blanco);
            border: 1px solid var(--gris-borde);
            padding: 50px;
        }
        .form-card::before {
            content: "";
            position: absolute;
            top: -1px; left: -1px;
            width: 100%; height: 4px;
            background: var(--primario);
        }

        h1 { font-size: 2rem; letter-spacing: -1.5px; margin-bottom: 10px; }
        p.subtitle { color: var(--gris-texto); font-size: 0.9rem; margin-bottom: 35px; }

        .form-group { margin-bottom: 25px; }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--negro);
        }
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--gris-borde);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primario); background: var(--fondo); }

        .btn-register {
            width: 100%;
            padding: 18px;
            background: var(--primario);
            color: white;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-register:hover { background: var(--negro); }

        .login-link { text-align: center; margin-top: 30px; font-size: 0.85rem; }
        .login-link a { color: var(--primario); font-weight: 600; text-decoration: none; }

        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">AtlasBank</div>
    <a href="/inicio.html" class="back-link">← Volver al Inicio</a>
</header>

<main>
    <div class="form-card" style="position: relative;">
        <h1>Crear Cuenta</h1>
        <p class="subtitle">Completa tus datos para abrir tu cuenta AtlasBank.</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="customerId">Usuario o Documento de Identidad (ID)</label>
                <input type="text" id="customerId" placeholder="Ej. carlos.garcia o 12345678" required>
            </div>

            <div class="form-group">
                <label for="firstName">Nombre(s)</label>
                <input type="text" id="firstName" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label for="lastName">Apellidos</label>
                <input type="text" id="lastName" placeholder="Tus apellidos" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Teléfono</label>
                <input type="tel" id="phone" placeholder="+52 000 000 0000">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div id="errorMessage" class="error-msg"></div>

            <button type="submit" class="btn-register">Crear Mi Cuenta</button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="/auth/login.html">Inicia sesión</a>
        </div>
    </div>
</main>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const customerId = document.getElementById('customerId').value;
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMessage');

    try {
        const response = await fetch('/api/customers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customerId, firstName, lastName, email, phone, password })
        });

        if (response.ok) {
            sessionStorage.setItem('customerId', customerId);
            sessionStorage.setItem('fullName', `${firstName} ${lastName}`);
            sessionStorage.setItem('role', 'USER');
            window.location.href = '/customer/dashboard.html';
        } else {
            errorMsg.textContent = 'No se pudo crear la cuenta. Intenta con otro identificador.';
            errorMsg.style.display = 'block';
        }
    } catch (err) {
        errorMsg.textContent = 'Error de conexión. Intenta más tarde.';
        errorMsg.style.display = 'block';
    }
});
</script>

</body>
</html>
