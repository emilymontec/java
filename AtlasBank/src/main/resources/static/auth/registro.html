<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank | Institution Enrollment</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
        body {
            background-color: var(--bg-alt);
            min-height: 100vh;
            padding: 80px 2rem;
        }

        .enrollment-container {
            max-width: 550px;
            margin: 0 auto;
        }

        .form-card {
            padding: 60px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            background: white;
            border: 1px solid var(--border);
            position: relative;
        }

        .form-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--primary);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            color: var(--bg-dark);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .error-msg {
            background: #fef2f2;
            color: #991b1b;
            padding: 15px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            margin-bottom: 25px;
            display: none;
            border: 1px solid #fee2e2;
        }

        .login-link {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="enrollment-container">
    <div class="form-card animate-up">
        <div style="text-align: center; margin-bottom: 40px;">
            <div class="logo" style="margin-bottom: 20px;">Atlas<span>Bank</span></div>
            <h1>Account Establishment</h1>
            <p class="subtitle">Official enrollment portal for sustainable banking.</p>
        </div>

        <div id="errorMessage" class="error-msg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label class="label" for="customerId">Digital Identity ID</label>
                <input type="text" id="customerId" class="form-control" style="border-radius: var(--radius-sm);" placeholder="Identification Number" required>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="label" for="firstName">Given Name</label>
                    <input type="text" id="firstName" class="form-control" style="border-radius: var(--radius-sm);" placeholder="First" required>
                </div>
                <div class="form-group">
                    <label class="label" for="lastName">Family Name</label>
                    <input type="text" id="lastName" class="form-control" style="border-radius: var(--radius-sm);" placeholder="Last" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label" for="email">Institutional Email</label>
                <input type="email" id="email" class="form-control" style="border-radius: var(--radius-sm);" placeholder="address@domain.com" required>
            </div>

            <div class="form-group">
                <label class="label" for="phone">Comm Link (Phone)</label>
                <input type="tel" id="phone" class="form-control" style="border-radius: var(--radius-sm);" placeholder="+00 000 000 0000">
            </div>

            <div class="form-group">
                <label class="label" for="password">Security Protocol Key</label>
                <input type="password" id="password" class="form-control" style="border-radius: var(--radius-sm);" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.1rem; margin-top: 15px; border-radius: var(--radius-sm);">
                Confirm Enrollment
            </button>
        </form>

        <div class="login-link">
            Already have active credentials? <a href="/auth/login.html" class="nav-link" style="color: var(--primary); font-weight: 700;">Log In</a>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 40px;">
        <a href="/inicio.html" class="nav-link" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6;">← RETURN TO PUBLIC VIEW</a>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const originalText = btn.textContent;
    
    btn.disabled = true;
    btn.textContent = 'Processing...';

    const customerId = document.getElementById('customerId').value;
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMessage');
    errorMsg.style.display = 'none';

    try {
        const response = await fetch('/api/customers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customerId, firstName, lastName, email, phone, password })
        });

        if (response.ok) {
            sessionStorage.setItem('customerId', customerId);
            sessionStorage.setItem('fullName', `${firstName} ${lastName}`);
            sessionStorage.setItem('role', 'USER');
            window.location.href = '/customer/dashboard.html';
        } else {
            errorMsg.textContent = 'Enrollment failure. Identity ID already registered.';
            errorMsg.style.display = 'block';
        }
    } catch (err) {
        errorMsg.textContent = 'Server communication protocol error. Retry later.';
        errorMsg.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
});
</script>
</body>
</html>
